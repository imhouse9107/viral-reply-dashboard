<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Replies">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Viral Reply Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0a0a0a; color: #fff;
            min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 20px;
            padding-top: env(safe-area-inset-top, 40px);
        }

        .screen { text-align: center; max-width: 400px; width: 100%; }
        .screen h1 { font-size: 28px; margin-bottom: 8px; }
        .screen .subtitle { color: #888; font-size: 15px; margin-bottom: 40px; }

        .pin-input { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
        .pin-input input {
            width: 56px; height: 64px; text-align: center;
            font-size: 26px; font-weight: 700;
            background: #1a1a1a; border: 2px solid #333; border-radius: 14px;
            color: #fff; outline: none; -webkit-appearance: none;
        }
        .pin-input input:focus { border-color: #2563eb; }

        .pin-error {
            color: #ef4444; font-size: 14px; height: 20px;
            opacity: 0; transition: opacity 0.3s;
        }
        .pin-error.show { opacity: 1; }

        .welcome {
            display: none; text-align: center; max-width: 400px; width: 100%;
        }
        .welcome h1 { font-size: 28px; margin-bottom: 8px; }
        .welcome .greeting { color: #888; font-size: 16px; margin-bottom: 32px; }
        .go-btn {
            display: block; width: 100%;
            background: #2563eb; color: #fff;
            padding: 18px 24px; border-radius: 14px;
            font-size: 18px; font-weight: 700;
            text-decoration: none; text-align: center;
            transition: background 0.15s;
        }
        .go-btn:active { background: #1d4ed8; }

        .logout-link {
            color: #555; font-size: 13px; margin-top: 24px;
            cursor: pointer; display: inline-block;
        }

        .install-banner {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #1a1a1a; border-top: 1px solid #333;
            padding: 16px 20px; text-align: center;
            display: none; z-index: 100;
            padding-bottom: env(safe-area-inset-bottom, 16px);
        }
        .install-banner p { font-size: 14px; color: #ccc; margin-bottom: 8px; }
        .install-banner .steps { font-size: 13px; color: #888; margin: 0; }
        .install-banner .dismiss {
            position: absolute; top: 8px; right: 16px;
            background: none; border: none; color: #666; font-size: 22px; cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div class="screen" id="login">
        <h1>Viral Reply Bot</h1>
        <p class="subtitle">Enter your PIN</p>
        <div class="pin-input">
            <input type="tel" maxlength="1" id="p1" inputmode="numeric" autofocus>
            <input type="tel" maxlength="1" id="p2" inputmode="numeric">
            <input type="tel" maxlength="1" id="p3" inputmode="numeric">
            <input type="tel" maxlength="1" id="p4" inputmode="numeric">
        </div>
        <p class="pin-error" id="pin-error">Wrong PIN. Try again.</p>
    </div>

    <!-- Welcome (after login, before redirect) -->
    <div class="welcome" id="welcome">
        <h1 id="welcome-name"></h1>
        <p class="greeting">Your suggestions are ready.</p>
        <a class="go-btn" id="go-btn" href="#">View Today's Suggestions</a>
        <span class="logout-link" onclick="logout()">Log out</span>
    </div>

    <!-- Install banner (iOS) -->
    <div class="install-banner" id="install-banner">
        <button class="dismiss" onclick="dismissInstall()">&times;</button>
        <p><strong>Add to your home screen</strong> for the full app experience</p>
        <p class="steps">Tap <strong>Share</strong> then <strong>Add to Home Screen</strong></p>
    </div>

    <script>
        // Each person gets their own PIN → goes straight to their dashboard
        var PIN_MAP = {
            '2026': { name: 'Henry', page: 'henry.html' },
            '1234': { name: 'Scott', page: 'scott.html' },
            '5678': { name: 'Lewis', page: 'lewis.html' }
        };

        var SESSION_KEY = 'vrb_user';

        function checkSession() {
            var user = localStorage.getItem(SESSION_KEY);
            if (user) {
                try {
                    var data = JSON.parse(user);
                    showWelcome(data.name, data.page);
                } catch(e) {
                    localStorage.removeItem(SESSION_KEY);
                }
            }
        }

        var inputs = [
            document.getElementById('p1'),
            document.getElementById('p2'),
            document.getElementById('p3'),
            document.getElementById('p4')
        ];

        inputs.forEach(function(input, i) {
            input.addEventListener('input', function() {
                if (input.value.length === 1 && i < 3) inputs[i + 1].focus();
                if (i === 3 && input.value.length === 1) {
                    var pin = inputs.map(function(el) { return el.value; }).join('');
                    var user = PIN_MAP[pin];
                    if (user) {
                        localStorage.setItem(SESSION_KEY, JSON.stringify(user));
                        showWelcome(user.name, user.page);
                    } else {
                        document.getElementById('pin-error').classList.add('show');
                        inputs.forEach(function(el) { el.value = ''; });
                        inputs[0].focus();
                        setTimeout(function() {
                            document.getElementById('pin-error').classList.remove('show');
                        }, 2000);
                    }
                }
            });
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && !input.value && i > 0) inputs[i - 1].focus();
            });
        });

        function showWelcome(name, page) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('welcome').style.display = 'block';
            document.getElementById('welcome-name').textContent = 'Hey ' + name;
            document.getElementById('go-btn').href = page;

            // Show install banner on iOS if not already installed
            var isIos = /iPad|iPhone|iPod/.test(navigator.userAgent);
            var isStandalone = window.navigator.standalone === true;
            if (isIos && !isStandalone && !localStorage.getItem('vrb_install_dismissed')) {
                document.getElementById('install-banner').style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem(SESSION_KEY);
            location.reload();
        }

        function dismissInstall() {
            document.getElementById('install-banner').style.display = 'none';
            localStorage.setItem('vrb_install_dismissed', 'true');
        }

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
        checkSession();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Replies">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Viral Reply Bot</title>
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --bg-tertiary: #2c2c2e;
            --bg-elevated: #3a3a3c;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --text-tertiary: #636366;
            --accent: #0a84ff;
            --accent-pressed: #0070e0;
            --success: #30d158;
            --danger: #ff453a;
            --separator: rgba(84,84,88,0.35);
            --radius-sm: 10px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
            min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 24px;
            padding-top: calc(var(--safe-top) + 40px);
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
        }

        /* Animations */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-8px); } 40%,80% { transform: translateX(8px); } }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-in { animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .shake { animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97); }

        /* Login */
        .screen { text-align: center; max-width: 380px; width: 100%; }
        .screen h1 {
            font-size: 34px; font-weight: 700; letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .screen .subtitle { color: var(--text-secondary); font-size: 17px; margin-bottom: 48px; font-weight: 400; }

        .pin-input { display: flex; gap: 14px; justify-content: center; margin-bottom: 28px; }
        .pin-input input {
            width: 56px; height: 64px; text-align: center;
            font-size: 28px; font-weight: 600; letter-spacing: -1px;
            background: var(--bg-secondary); border: 2px solid transparent; border-radius: var(--radius-md);
            color: var(--text-primary); outline: none; -webkit-appearance: none;
            transition: border-color 0.2s ease, transform 0.15s ease, background 0.2s ease;
        }
        .pin-input input:focus { border-color: var(--accent); background: var(--bg-tertiary); }
        .pin-input input.filled { transform: scale(1.05); }
        .pin-input input.shake { animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97); }

        .pin-error {
            color: var(--danger); font-size: 15px; font-weight: 500; height: 22px;
            opacity: 0; transition: opacity 0.25s ease;
        }
        .pin-error.show { opacity: 1; }

        /* Welcome */
        .welcome { display: none; text-align: center; max-width: 400px; width: 100%; }
        .welcome h1 { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
        .welcome .greeting { color: var(--text-secondary); font-size: 17px; margin-bottom: 36px; }

        .action-btn {
            display: block; width: 100%;
            padding: 18px 24px; border-radius: var(--radius-md);
            font-size: 17px; font-weight: 600; letter-spacing: -0.2px;
            text-decoration: none; text-align: center; border: none; cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }
        .action-btn:active { transform: scale(0.97); opacity: 0.85; }
        .action-btn.primary { background: var(--accent); color: #fff; }
        .action-btn.secondary { background: var(--success); color: #fff; margin-top: 12px; }

        .notify-status {
            display: none; margin-top: 16px;
            font-size: 15px; color: var(--success); font-weight: 500;
        }
        .notify-status .checkmark { font-size: 18px; margin-right: 4px; }

        .logout-link {
            color: var(--text-tertiary); font-size: 15px; margin-top: 28px;
            cursor: pointer; display: inline-block;
            transition: color 0.15s ease;
        }
        .logout-link:active { color: var(--text-secondary); }

        /* Install banner */
        .install-banner {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bg-secondary);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--separator);
            padding: 20px 24px;
            padding-bottom: calc(var(--safe-bottom) + 20px);
            text-align: center;
            display: none; z-index: 100;
            animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .install-banner p { font-size: 15px; color: var(--text-primary); margin-bottom: 6px; font-weight: 600; }
        .install-banner .steps { font-size: 13px; color: var(--text-secondary); margin: 0; font-weight: 400; }
        .install-banner .dismiss {
            position: absolute; top: 12px; right: 16px;
            background: var(--bg-tertiary); border: none; color: var(--text-secondary);
            width: 28px; height: 28px; border-radius: 14px;
            font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div class="screen animate-in" id="login">
        <h1>Replies</h1>
        <p class="subtitle">Enter your PIN to get started</p>
        <div class="pin-input" id="pin-container">
            <input type="tel" maxlength="1" id="p1" inputmode="numeric" autocomplete="one-time-code">
            <input type="tel" maxlength="1" id="p2" inputmode="numeric" autocomplete="one-time-code">
            <input type="tel" maxlength="1" id="p3" inputmode="numeric" autocomplete="one-time-code">
            <input type="tel" maxlength="1" id="p4" inputmode="numeric" autocomplete="one-time-code">
        </div>
        <p class="pin-error" id="pin-error" role="alert" aria-live="assertive">Incorrect PIN</p>
    </div>

    <!-- Welcome -->
    <div class="welcome" id="welcome">
        <h1 id="welcome-name"></h1>
        <p class="greeting" id="welcome-greeting"></p>
        <a class="action-btn primary" id="go-btn" href="#">View Today's Suggestions</a>
        <button class="action-btn secondary" id="notify-btn" onclick="enableNotifications()" style="display:none">Turn On Notifications</button>
        <p class="notify-status" id="notify-status"><span class="checkmark">&#10003;</span> Notifications on</p>
        <span class="logout-link" onclick="logout()">Sign out</span>
    </div>

    <!-- Install banner -->
    <div class="install-banner" id="install-banner">
        <button class="dismiss" onclick="dismissInstall()">&#10005;</button>
        <p>Install this app</p>
        <p class="steps">Tap Share, then "Add to Home Screen"</p>
    </div>

    <script>
        var PIN_MAP = {
            '2026': { name: 'Henry', page: 'henry.html' },
            '1234': { name: 'Scott', page: 'scott.html' },
            '5678': { name: 'Lewis', page: 'lewis.html' },
            '4321': { name: 'Hailey', page: 'hailey.html' }
        };
        var SESSION_KEY = 'vrb_user';

        function checkSession() {
            var user = localStorage.getItem(SESSION_KEY);
            if (user) {
                try {
                    var data = JSON.parse(user);
                    // Auto-redirect if already logged in
                    window.location.href = data.page;
                } catch(e) { localStorage.removeItem(SESSION_KEY); }
            }
            // Focus first input after a short delay (lets animation finish)
            setTimeout(function() { document.getElementById('p1').focus(); }, 300);
        }

        var inputs = [document.getElementById('p1'), document.getElementById('p2'), document.getElementById('p3'), document.getElementById('p4')];

        inputs.forEach(function(input, i) {
            input.addEventListener('input', function() {
                if (input.value) input.classList.add('filled');
                else input.classList.remove('filled');
                if (input.value.length === 1 && i < 3) inputs[i + 1].focus();
                if (i === 3 && input.value.length === 1) {
                    var pin = inputs.map(function(el) { return el.value; }).join('');
                    var user = PIN_MAP[pin];
                    if (user) {
                        localStorage.setItem(SESSION_KEY, JSON.stringify(user));
                        // Auto-request notification permission silently
                        if ('Notification' in window && Notification.permission === 'default') {
                            Notification.requestPermission().then(function(p) {
                                if (p === 'granted') subscribeToPush();
                            });
                        }
                        // Redirect straight to dashboard
                        window.location.href = user.page;
                    } else {
                        document.getElementById('pin-error').classList.add('show');
                        document.getElementById('pin-container').classList.add('shake');
                        inputs.forEach(function(el) { el.value = ''; el.classList.remove('filled'); });
                        inputs[0].focus();
                        setTimeout(function() {
                            document.getElementById('pin-error').classList.remove('show');
                            document.getElementById('pin-container').classList.remove('shake');
                        }, 2000);
                    }
                }
            });
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace') {
                    if (!input.value && i > 0) { inputs[i - 1].focus(); inputs[i - 1].value = ''; inputs[i - 1].classList.remove('filled'); }
                    else { input.value = ''; input.classList.remove('filled'); }
                }
            });
        });

        var VAPID_PUBLIC = 'BCZlkQ7sM4MScJ0hiRDwoyHv4BnUJ1tZcB-PWNvmYmJVCAuydpJkWIdKgUMJpnXc8xj-7rj6aHlUxaZ_STQkTJg';
        function urlBase64ToUint8Array(b) {
            var p = '='.repeat((4 - b.length % 4) % 4), s = (b + p).replace(/-/g, '+').replace(/_/g, '/'), r = atob(s), a = new Uint8Array(r.length);
            for (var i = 0; i < r.length; i++) a[i] = r.charCodeAt(i); return a;
        }
        function enableNotifications() {
            if (!('Notification' in window) || !('PushManager' in window)) return;
            Notification.requestPermission().then(function(p) { if (p === 'granted') subscribeToPush(); });
        }
        function subscribeToPush() {
            navigator.serviceWorker.ready.then(function(reg) {
                return reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC) });
            }).then(function(sub) {
                var user = JSON.parse(localStorage.getItem(SESSION_KEY) || '{}');
                localStorage.setItem('vrb_push_sub', JSON.stringify({ person: (user.name || '').toLowerCase(), subscription: sub.toJSON() }));
            }).catch(function() {});
        }

        function logout() { localStorage.removeItem(SESSION_KEY); location.reload(); }
        function dismissInstall() { document.getElementById('install-banner').style.display = 'none'; localStorage.setItem('vrb_install_dismissed', 'true'); }
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
        checkSession();
    </script>
</body>
</html>

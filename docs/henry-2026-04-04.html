<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <title>Henry | 2026-04-04</title>
    <style>
        :root {
            --bg: #000; --bg-card: #1c1c1e; --bg-elevated: #2c2c2e; --bg-reply: #1c1c1e;
            --text: #fff; --text-2: rgba(235,235,245,0.60); --text-3: rgba(235,235,245,0.45);
            --accent: #0a84ff; --success: #30d158; --warning: #ff9f0a; --danger: #ff453a;
            --sep: rgba(84,84,88,0.35);
            --r: 14px; --safe-top: env(safe-area-inset-top, 0px); --safe-bot: env(safe-area-inset-bottom, 0px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            padding: 0 20px 100px;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* Sticky header */
        .nav {
            position: sticky; top: 0; z-index: 100;
            padding: 12px 0 14px;
            padding-top: calc(var(--safe-top) + 12px);
            background: rgba(0,0,0,0.72);
            backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid rgba(255,255,255,0.08);
            margin: 0 -20px; padding-left: 20px; padding-right: 20px;
        }
        .nav-top {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }
        .nav-back {
            color: var(--accent); font-size: 17px; text-decoration: none; font-weight: 400;
            display: flex; align-items: center; gap: 4px;
            min-height: 44px; padding: 8px 4px 8px 0;
        }
        .nav-back svg { width: 10px; height: 17px; fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .nav-title { font-size: 17px; font-weight: 600; }
        .nav-done { font-size: 15px; font-weight: 600; color: var(--success); }
        .progress-track { height: 4px; background: var(--bg-elevated); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); border-radius: 2px; transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        /* Header */
        .header { padding: 20px 0 8px; }
        .header h1 { font-size: 28px; font-weight: 700; letter-spacing: 0.36px; }
        .header .date { color: var(--text-2); font-size: 15px; margin-top: 4px; }
        .empty { text-align: center; color: var(--text-3); padding: 80px 20px; font-size: 17px; }

        /* Cards */
        .card {
            background: var(--bg-card); border-radius: var(--r);
            margin: 12px 0; overflow: hidden;
            transition: opacity 0.4s ease, transform 0.4s ease;
            animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        /* Animation delays applied inline per card */
        .card.fire { box-shadow: 0 0 0 1px var(--danger), 0 4px 24px rgba(255,69,58,0.15); }
        .card.hot { box-shadow: 0 0 0 1px var(--warning), 0 4px 24px rgba(255,159,10,0.1); }
        .card.done { opacity: 0.35; transform: scale(0.98); }
        .card.done .copy-btn { background: var(--success); }

        .card-top { padding: 14px 16px 10px; display: flex; justify-content: space-between; align-items: center; }
        .badge {
            font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
            padding: 4px 10px; border-radius: 8px; background: var(--bg-elevated); color: var(--text-2);
        }
        .badge.reddit { background: rgba(255,102,0,0.15); color: #ff6600; }
        .badge.hackernews { background: rgba(255,102,0,0.15); color: #ff6600; }
        .badge.twitter { background: rgba(29,155,240,0.15); color: #1d9bf0; }
        .badge.trending-take { background: rgba(168,85,247,0.15); color: #a855f7; }
        .badge.daily-tweet { background: rgba(48,209,88,0.15); color: #30d158; }
        .badge.viral-spin { background: rgba(255,69,58,0.15); color: #ff453a; }
        .badge.linkedin { background: rgba(10,102,194,0.15); color: #0a66c2; }
        .meta-right { display: flex; align-items: center; gap: 8px; }
        .done-check { display: none; color: var(--success); font-size: 14px; font-weight: 700; }
        .card.done .done-check { display: flex; align-items: center; gap: 4px; }
        .engagement { font-size: 13px; color: var(--text-3); }
        .engagement strong { color: var(--warning); font-weight: 600; }

        .context { padding: 0 16px 10px; font-size: 14px; color: var(--text-3); line-height: 1.45; }
        .context a { color: var(--accent); text-decoration: none; }

        .reply {
            padding: 14px 16px; font-size: 17px; line-height: 1.5; letter-spacing: -0.41px;
            color: rgba(255,255,255,0.92); background: rgba(255,255,255,0.04);
            border-top: 0.5px solid var(--sep);
        }
        .card.fire .reply { font-size: 17px; padding: 16px 20px; }

        .copy-btn {
            display: flex; width: 100%; padding: 15px;
            background: var(--accent); color: #fff; border: none;
            font-size: 16px; font-weight: 600; cursor: pointer;
            align-items: center; justify-content: center; gap: 8px;
            transition: transform 0.2s ease-out, opacity 0.2s ease-out, background 0.25s ease;
        }
        .copy-btn:active { transform: scale(0.96); opacity: 0.85; transition: transform 0.1s ease-out, opacity 0.1s ease-out; }
        .copy-btn.copied { background: var(--success); }
        .copy-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .post-link {
            display: block; text-align: center; padding: 12px;
            color: var(--accent); font-size: 14px; font-weight: 500; text-decoration: none;
            border-top: 0.5px solid var(--sep);
            transition: opacity 0.15s ease;
        }
        .post-link:active { opacity: 0.6; }

        .feedback-row { display:flex; border-top: 0.5px solid var(--sep); }
        .fb-posted { flex:1; padding:14px 12px; min-height:48px; background:transparent; border:none; color:var(--success); font-size:15px; font-weight:600; cursor:pointer; transition: opacity 0.15s; }
        .fb-posted:active { opacity: 0.6; }
        .fb-skip { flex:1; padding:14px 12px; min-height:48px; background:transparent; border:none; color:var(--text-3); font-size:15px; font-weight:500; cursor:pointer; border-left:0.5px solid var(--sep); transition: opacity 0.15s; }
        .fb-skip:active { opacity: 0.6; }

        /* All done celebration */
        .celebration {
            display: none; text-align: center; padding: 48px 20px;
        }
        .celebration.show { display: block; animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .celebration .emoji { font-size: 48px; margin-bottom: 16px; }
        .celebration h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .celebration p { color: var(--text-2); font-size: 15px; }

        /* Toast */
        .toast {
            position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: rgba(50,50,50,0.9);
            backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px);
            color: var(--text); padding: 14px 24px;
            border-radius: 14px; font-weight: 600; font-size: 15px;
            opacity: 0; transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none; z-index: 1000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            padding-bottom: calc(14px + var(--safe-bot));
            display: flex; align-items: center; gap: 8px;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast .check { color: var(--success); }
        .countdown {
            text-align: center;
            padding: 12px 16px;
            font-size: 14px;
            color: var(--text-2);
            border-bottom: 0.5px solid var(--sep);
        }
        .countdown strong { color: var(--accent); }
        .timed-section { display: none; }
        .timed-section.revealed { display: block; animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .locked-notice {
            text-align: center; padding: 24px 20px; margin: 12px 0;
            background: var(--bg-card); border-radius: var(--r);
            color: var(--text-3); font-size: 15px;
        }
        .locked-notice strong { color: var(--text-2); }

        .filter-tabs {
            display: flex; gap: 6px; padding: 12px 0; overflow-x: auto;
            -webkit-overflow-scrolling: touch; scrollbar-width: none;
        }
        .filter-tabs::-webkit-scrollbar { display: none; }
        .tab {
            padding: 8px 16px; border-radius: 20px; border: none;
            background: var(--bg-elevated); color: var(--text-2);
            font-size: 14px; font-weight: 500; white-space: nowrap; cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .tab.active { background: var(--accent); color: #fff; }
        .tab:active { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="nav">
        <div class="nav-top">
            <a class="nav-back" href="index.html" onclick="if(history.length>1){event.preventDefault();history.back();}">
                <svg viewBox="0 0 10 17"><polyline points="9 1 1 8.5 9 16"/></svg> Back
            </a>
            <span class="nav-title">Henry</span>
            <span class="nav-done" id="progress-text">0/0</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div class="countdown" id="countdown"></div>

    <div class="filter-tabs">
        <button class="tab active" onclick="filterCards('all', this)">All</button>
        <button class="tab" onclick="filterCards('linkedin', this)">LinkedIn</button>
        <button class="tab" onclick="filterCards('twitter', this)">Twitter</button>
        <button class="tab" onclick="filterCards('reddit', this)">Reddit</button>
        <button class="tab" onclick="filterCards('hackernews', this)">HN</button>
        <button class="tab" onclick="filterCards('scripts', this)">Scripts</button>
    </div>

    <div class="header">
        <h1>Today's Suggestions</h1>
        <div class="date">2026-04-04</div>
    </div>

    <div id="cards-container">
    <div class="empty">No suggestions yet today. Check back after the bot runs.</div>
    </div>

    <div class="celebration" id="celebration">
        <div class="emoji">&#127881;</div>
        <h2>All done for today</h2>
        <p>Every suggestion posted. Consistency compounds.</p>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"><span class="check">&#10003;</span> Copied to clipboard</div>

    <script>
        function filterCards(category, btn) {
            var tabs = document.querySelectorAll('.tab');
            for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
            btn.classList.add('active');

            var cards = document.querySelectorAll('.card');
            for (var i = 0; i < cards.length; i++) {
                var cat = cards[i].getAttribute('data-category') || '';
                if (category === 'all' || cat.indexOf(category) !== -1) {
                    cards[i].style.display = '';
                } else {
                    cards[i].style.display = 'none';
                }
            }

            var sections = document.querySelectorAll('.timed-section');
            for (var i = 0; i < sections.length; i++) {
                var visibleCards = sections[i].querySelectorAll('.card:not([style*="display: none"])');
                if (category === 'all' || visibleCards.length > 0) {
                    sections[i].style.display = '';
                } else {
                    sections[i].style.display = 'none';
                }
            }
        }

        var TOTAL = 0;
        var STORAGE_KEY = 'vrb_done_henry_2026-04-04';
        var FEEDBACK_KEY = 'vrb_feedback_henry_2026-04-04';
        var PERSON = 'henry';
        var FEEDBACK_URL = 'https://script.google.com/macros/s/AKfycbzC5tDacKAi8JcU_aUsdOapCTMooV_krz1H2dtxHORL3egj1uWhj2FmlwzXduWsIEKm/exec';

        function getDone() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
            catch(e) { return []; }
        }
        function saveDone(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

        function updateProgress() {
            var done = getDone();
            var pct = TOTAL > 0 ? Math.round(done.length / TOTAL * 100) : 0;
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('progress-text').textContent = done.length + '/' + TOTAL;
            done.forEach(function(id) {
                var card = document.getElementById('card-' + id);
                if (card) card.classList.add('done');
            });
            if (done.length >= TOTAL && TOTAL > 0) {
                document.getElementById('celebration').classList.add('show');
            }
        }

        function markDone(id) {
            var done = getDone();
            if (done.indexOf(id) === -1) { done.push(id); saveDone(done); }
            var card = document.getElementById('card-' + id);
            if (card) card.classList.add('done');
            updateProgress();
        }

        function copyText(id, btn) {
            var text = document.getElementById('reply-' + id).innerText;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function() { showCopied(btn, id); })
                .catch(function() { fallbackCopy(text, btn, id); });
            } else { fallbackCopy(text, btn, id); }
        }

        function copyScript(elemId, btn) {
            var text = document.getElementById(elemId).innerText;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function() { showScriptCopied(btn); })
                .catch(function() { fallbackCopyScript(text, btn); });
            } else { fallbackCopyScript(text, btn); }
        }

        function fallbackCopyScript(text, btn) {
            var ta = document.createElement('textarea'); ta.value = text;
            ta.style.cssText = 'position:fixed;left:-9999px';
            document.body.appendChild(ta); ta.select();
            try { document.execCommand('copy'); showScriptCopied(btn); } catch(e) {}
            document.body.removeChild(ta);
        }

        function showScriptCopied(btn) {
            btn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Copied';
            btn.classList.add('copied');
            var toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 1800);
        }

        function fallbackCopy(text, btn, id) {
            var ta = document.createElement('textarea'); ta.value = text;
            ta.style.cssText = 'position:fixed;left:-9999px';
            document.body.appendChild(ta); ta.select();
            try { document.execCommand('copy'); showCopied(btn, id); } catch(e) {}
            document.body.removeChild(ta);
        }

        function showCopied(btn, id) {
            markDone(id);
            sendFeedback(id, 'copied');
            btn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Copied';
            btn.classList.add('copied');
            var toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 1800);
        }

        function getFeedback() {
            try { return JSON.parse(localStorage.getItem(FEEDBACK_KEY) || '{}'); }
            catch(e) { return {}; }
        }
        function saveFeedback(obj) { localStorage.setItem(FEEDBACK_KEY, JSON.stringify(obj)); }

        function sendFeedback(id, action) {
            if (!FEEDBACK_URL) return;
            var reply = document.getElementById('reply-' + id);
            var card = document.getElementById('card-' + id);
            var platform = '';
            if (card) {
                var badge = card.querySelector('.badge');
                if (badge) platform = badge.textContent.trim();
            }
            fetch(FEEDBACK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    person: PERSON,
                    suggestion_id: id,
                    action: action,
                    platform: platform,
                    reply_preview: reply ? reply.textContent.substring(0, 100) : ''
                })
            }).catch(function(err) {
                console.warn('Feedback sync failed (will retry on next action):', err);
            });
        }

        function markPosted(id) {
            var fb = getFeedback();
            fb[id] = 'posted';
            saveFeedback(fb);
            markDone(id);
            sendFeedback(id, 'posted');
        }
        function markSkip(id) {
            var fb = getFeedback();
            fb[id] = 'skip';
            saveFeedback(fb);
            var card = document.getElementById('card-' + id);
            if (card) { card.style.display = 'none'; }
            updateProgress();
            sendFeedback(id, 'skip');
        }

        // Restore feedback state on load
        (function() {
            var fb = getFeedback();
            for (var id in fb) {
                if (fb[id] === 'posted') { markDone(parseInt(id)); }
                else if (fb[id] === 'skip') {
                    var card = document.getElementById('card-' + id);
                    if (card) { card.style.display = 'none'; }
                }
            }
        })();

        updateProgress();

        var SCHEDULE = [
            {hour: 8, min: 0, label: 'Reddit comments', reveal: 8},
            {hour: 9, min: 15, label: 'LinkedIn posts', reveal: 9},
            {hour: 10, min: 0, label: 'Film scripts', reveal: 10},
            {hour: 12, min: 0, label: 'Tweets', reveal: 12},
        ];

        function revealSections() {
            var h = new Date().getHours();
            var sections = document.querySelectorAll('.timed-section');
            for (var i = 0; i < sections.length; i++) {
                var revealHour = parseInt(sections[i].getAttribute('data-reveal'));
                if (h >= revealHour) {
                    sections[i].classList.add('revealed');
                }
            }
        }

        function updateCountdown() {
            var now = new Date();
            var h = now.getHours(), m = now.getMinutes();
            var next = null;
            for (var i = 0; i < SCHEDULE.length; i++) {
                if (h < SCHEDULE[i].hour || (h === SCHEDULE[i].hour && m < SCHEDULE[i].min)) {
                    next = SCHEDULE[i]; break;
                }
            }
            var el = document.getElementById('countdown');
            if (!el) return;
            if (!next) {
                el.innerHTML = 'All sections unlocked. Go post.';
            } else {
                var mins = (next.hour - h) * 60 + (next.min - m);
                var hh = Math.floor(mins / 60);
                var mm = mins % 60;
                var timeStr = hh > 0 ? hh + 'h ' + mm + 'm' : mm + 'm';
                el.innerHTML = 'Next: <strong>' + next.label + '</strong> unlocks in ' + timeStr;
            }
            revealSections();
        }
        setInterval(updateCountdown, 60000);
        updateCountdown();
    </script>
</body>
</html>

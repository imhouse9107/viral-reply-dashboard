<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscription Saved</title>
<style>
body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #fff; padding: 40px; text-align: center; }
.sub-data { background: #1a1a1a; padding: 16px; border-radius: 8px; margin: 20px 0; font-size: 12px; word-break: break-all; text-align: left; color: #888; max-height: 200px; overflow: auto; }
</style></head><body>
<h2>Notification subscription registered</h2>
<p style="color:#16a34a">You'll receive push notifications when new suggestions are ready.</p>
<p style="color:#888; font-size:13px">You can close this page.</p>
<div class="sub-data" id="sub-data"></div>
<script>
var params = new URLSearchParams(window.location.search);
var sub = params.get('sub');
if (sub) document.getElementById('sub-data').textContent = sub;
</script>
</body></html>
